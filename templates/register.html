{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-5">
        <div class="card shadow-lg border-0">
            <div class="card-header bg-primary text-white text-center py-3">
                <h4 class="mb-0">Create an Account</h4>
            </div>
            <div class="card-body p-4">
                <form method="post">
                    <div class="mb-3">
                        <label class="form-label">Username</label>
                        <input type="text" name="username" class="form-control" placeholder="e.g. farmer_john" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Gmail / Email</label>
                        <input type="email" name="email" class="form-control" placeholder="john@gmail.com" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Phone Number</label>
                        <input type="tel" name="phone" class="form-control" placeholder="012-3456789" required>
                    </div>

                    <div class="mb-4">
                        <label class="form-label">Password</label>
                        <input type="password" name="password" class="form-control" placeholder="••••••••" required>
                    </div>
                    
                    <div class="d-grid gap-2">
                        <button type="submit" class="btn btn-primary btn-lg">Register</button>
                    </div>
                </form>
            </div>
            <div class="card-footer text-center bg-light py-3">
                <span class="text-muted">Already have an account?</span> 
                <a href="{{ url_for('login') }}" class="text-primary fw-bold text-decoration-none">Login here</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
